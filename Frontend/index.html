<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pariksha Library Admin Panel</title>
    
    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="icon" type="image/x-icon" href="https://res.cloudinary.com/dca2tsaf6/image/upload/v1765696509/parikshaLibrarylogo_ehqywu.jpg">
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    
    <style>
      :root {
        /* Fallbacks */
        --color-primary: 4 146 194;
        --bg-main: 249 250 251;
        --text-main: 17 24 39;
      }

      /* =========================================
         1. APPEARANCE (Backgrounds & Text)
         Attribute: data-appearance="..."
      ========================================= */

      /* Light Mode */
      [data-appearance='light'] {
        --bg-main: 249 250 251;       /* gray-50 */
        --bg-card: 255 255 255;       /* white */
        --text-main: 17 24 39;        /* gray-900 */
        --text-muted: 107 114 128;    /* gray-500 */
        --border-line: 229 231 235;   /* gray-200 */
      }

      /* Dark Mode (Standard Slate) */
      [data-appearance='dark'] {
        --bg-main: 15 23 42;          /* slate-900 */
        --bg-card: 30 41 59;          /* slate-800 */
        --text-main: 241 245 249;     /* slate-100 */
        --text-muted: 148 163 184;    /* slate-400 */
        --border-line: 51 65 85;      /* slate-700 */
      }

      /* Midnight (Pitch Black / High Contrast) */
      [data-appearance='midnight'] {
        --bg-main: 0 0 0;             /* black */
        --bg-card: 23 23 23;          /* neutral-900 */
        --text-main: 255 255 255;     /* white */
        --text-muted: 163 163 163;    /* neutral-400 */
        --border-line: 64 64 64;      /* neutral-700 */
      }

      /* Nord (Cool Grey) */
      [data-appearance='nord'] {
        --bg-main: 46 52 64;          /* Polar Night 0 */
        --bg-card: 59 66 82;          /* Polar Night 1 */
        --text-main: 236 239 244;     /* Snow Storm */
        --text-muted: 216 222 233;    /* Snow Storm 2 */
        --border-line: 76 86 106;     /* Polar Night 3 */
      }


      /* =========================================
         2. ACCENT COLORS (Buttons & Highlights)
         Attribute: data-accent="..."
      ========================================= */

      [data-accent='blue'] {
        --color-primary: 4 146 194;          /* Cerulean */
        --color-primary-hover: 3 116 156;
        --color-primary-light: 240 249 255; /* Note: In dark mode this might need opacity adjustment via Tailwind classes */
      }

      [data-accent='emerald'] {
        --color-primary: 16 185 129; 
        --color-primary-hover: 5 150 105;
        --color-primary-light: 236 253 245;
      }

      [data-accent='purple'] {
        --color-primary: 139 92 246; 
        --color-primary-hover: 124 58 237;
        --color-primary-light: 245 243 255;
      }

      [data-accent='orange'] {
        --color-primary: 249 115 22; 
        --color-primary-hover: 234 88 12;
        --color-primary-light: 255 247 237;
      }

      [data-accent='rose'] {
        --color-primary: 244 63 94; 
        --color-primary-hover: 225 29 72;
        --color-primary-light: 255 241 242;
      }

      /* Base styles */
      body {
        background-color: rgb(var(--bg-main));
        color: rgb(var(--text-main));
        transition: background-color 0.3s, color 0.3s;
      }

      h1, h2, h3, h4, h5, h6 {
        font-family: 'Playfair Display', serif;
      }

      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: rgb(var(--bg-main)); 
      }
      ::-webkit-scrollbar-thumb {
        background-color: rgb(var(--border-line));
        border-radius: 9999px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background-color: rgb(var(--color-primary)); 
      }
    </style>

    <script>
      tailwind.config = {
        darkMode: 'class', 
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              serif: ['Playfair Display', 'serif'],
            },
            colors: {
              brand: {
                teal: 'rgb(var(--color-primary) / <alpha-value>)',
                'teal-hover': 'rgb(var(--color-primary-hover) / <alpha-value>)',
                'teal-light': 'rgb(var(--color-primary-light) / <alpha-value>)',
              },
              skin: {
                base: 'rgb(var(--bg-main) / <alpha-value>)',
                surface: 'rgb(var(--bg-card) / <alpha-value>)',
                text: 'rgb(var(--text-main) / <alpha-value>)',
                muted: 'rgb(var(--text-muted) / <alpha-value>)',
                border: 'rgb(var(--border-line) / <alpha-value>)',
              }
            }
          },
        },
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
